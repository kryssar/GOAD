# DNSCHANGE
# - name: "disable interface {{nat_adapter}} before join domain"
#   win_shell: netsh interface set interface "{{nat_adapter}}" disable

- name: "disable the registration of the {{nat_adapter}} interface (NAT address) in DNS"
  ansible.windows.win_shell:
    Get-NetAdapter '{{nat_adapter}}' | Set-DNSClient -RegisterThisConnectionsAddress $False
  when: two_adapters

- name: Ensure that domain exists
  win_domain:
    domain_netbios_name: "{{netbios_name}}"
    dns_domain_name: "{{domain}}"
    safe_mode_password: "{{domain_password}}"
  register: check_domain

- name: Ensure WinRM firewall rules apply to all profiles before domain creation reboot
  ansible.windows.win_powershell:
    script: |
      $rules = Get-NetFirewallRule -DisplayGroup 'Windows Remote Management' -ErrorAction SilentlyContinue
      if ($rules) { $rules | Set-NetFirewallRule -Profile Any -Enabled True }
      if (-not (Get-NetFirewallRule -Name 'SAGA-WinRM-HTTP-Any' -ErrorAction SilentlyContinue)) {
          New-NetFirewallRule -Name 'SAGA-WinRM-HTTP-Any' `
              -DisplayName 'SAGA WinRM HTTP All Profiles' `
              -Protocol TCP -LocalPort 5985 -Direction Inbound `
              -Action Allow -Profile Any -Enabled True
      }
  when: check_domain.changed

- name: Reboot to complete domain creation
  win_reboot:
    reboot_timeout: 1800
    post_reboot_delay: 300
  when: check_domain.changed

- name: Ensure the server is a domain controller
  win_domain_controller:
    dns_domain_name: "{{domain}}"
    domain_admin_user: "{{domain_username}}"
    domain_admin_password: "{{domain_password}}"
    safe_mode_password: "{{domain_password}}"
    state: domain_controller
  register: check_domain_controller

- name: Ensure WinRM firewall rules apply to all profiles before DC promotion reboot
  ansible.windows.win_powershell:
    script: |
      $rules = Get-NetFirewallRule -DisplayGroup 'Windows Remote Management' -ErrorAction SilentlyContinue
      if ($rules) { $rules | Set-NetFirewallRule -Profile Any -Enabled True }
      if (-not (Get-NetFirewallRule -Name 'SAGA-WinRM-HTTP-Any' -ErrorAction SilentlyContinue)) {
          New-NetFirewallRule -Name 'SAGA-WinRM-HTTP-Any' `
              -DisplayName 'SAGA WinRM HTTP All Profiles' `
              -Protocol TCP -LocalPort 5985 -Direction Inbound `
              -Action Allow -Profile Any -Enabled True
      }
  when: check_domain_controller.changed

- name: Reboot to complete domain controller setup
  win_reboot:
    reboot_timeout: 1800
    post_reboot_delay: 300
  when: check_domain_controller.changed

# DNSCHANGE
# - name: "enable interface {{nat_adapter}} after domain joined"
#   win_shell: netsh interface set interface "{{nat_adapter}}" enable
#   register: enable_interface_dc
#   until: "enable_interface_dc is not failed"
#   retries: 3
#   delay: 120

- name: Be sure DNS feature is installed
  win_feature:
    name: DNS
    state: present

- name: "SAGA | Ensure air-gapped PS modules present (xDnsServer, ActiveDirectoryDSC)"
  win_shell: |
    $required = @('xDnsServer','ActiveDirectoryDsc')
    $found = Get-Module -ListAvailable -Name $required |
             Select-Object -ExpandProperty Name | Sort-Object -Unique
    $missing = $required | Where-Object { $found -notcontains $_ }
    if ($missing.Count -eq 0) { Write-Output "present" }
    else { Write-Output "missing:$($missing -join ',')" }
  register: dc_psmodules_check

- name: "SAGA | Copy air-gapped PS modules archive to DC (skip if present)"
  win_copy:
    src: "files/psmodules/psmodules-airgap.zip"
    dest: "C:\\Windows\\Temp\\psmodules-airgap.zip"
  when: "'present' not in dc_psmodules_check.stdout"

- name: "SAGA | Extract PS modules on DC (air-gapped)"
  win_shell: |
    Expand-Archive -Path 'C:\Windows\Temp\psmodules-airgap.zip' `
      -DestinationPath "$env:ProgramFiles\WindowsPowerShell\Modules" -Force
    Remove-Item 'C:\Windows\Temp\psmodules-airgap.zip' -Force
    Write-Output "extracted"
  when: "'present' not in dc_psmodules_check.stdout"

- name: Check for xDnsServer Powershell module
  win_psmodule:
    name: xDnsServer
    state: present

- name: enable only the {{domain_adapter}} interface (local) for DNS client requests
  ansible.windows.win_shell: dnscmd . /resetlistenaddresses {{ hostvars[dict_key].ansible_host }}
  when: two_adapters

- name: Configure DNS Forwarders
  win_dsc:
    resource_name: xDnsServerForwarder
    IsSingleInstance: "yes"
    UseRootHint: false
    IPAddresses:
      - "{{dns_server_forwarder}}"

#- name: install nuget
#  win_shell: install-packageprovider -name nuget -force

- name: "Install XactiveDirectory"
  win_psmodule:
    name: ActiveDirectoryDSC
    state: present

- name: Ensure Administrator is part of Enterprise Admins
  win_domain_group_membership:
    name: "Enterprise Admins"
    members:
      - Administrator
    state: present

- name: Ensure Administrator is part of Domain Admins
  win_domain_group_membership:
    name: "Domain Admins"
    members:
      - Administrator
    state: present

- name: "Force a DNS on the adapter {{nat_adapter}}"
  ansible.windows.win_dns_client:
    adapter_names: "{{nat_adapter}}"
    dns_servers: 
      - "{{hostvars[dns_domain].ansible_host}}"
      - "{{dns_server}}"
  when: force_dns_server == "yes"

- name: Set a proxy for specific protocols
  community.windows.win_http_proxy:
    proxy:
      http: "{{ad_http_proxy}}"
      https: "{{ad_https_proxy}}"
  when: http_proxy == "yes"

- name: Configure IE to use a specific proxy per protocol
  community.windows.win_inet_proxy:
    proxy:
      http: "{{ad_http_proxy}}"
      https: "{{ad_https_proxy}}"
  when: http_proxy == "yes"

- name: "SAGA | Ensure PSGallery registered and trusted (PSGet 1.0.0.1, air-gapped safe)"
  win_shell: |
    $repo = Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue
    if ($repo -and $repo.InstallationPolicy -eq 'Trusted') {
        Write-Output "already-trusted"
    } else {
        $xmlPath = "$env:LOCALAPPDATA\Microsoft\Windows\PowerShell\PowerShellGet\PSRepositories.xml"
        New-Item -Force -ItemType Directory -Path (Split-Path $xmlPath) | Out-Null
        $entry = [pscustomobject]@{
            Name                      = 'PSGallery'
            SourceLocation            = 'https://www.powershellgallery.com/api/v2/'
            PublishLocation           = 'https://www.powershellgallery.com/api/v2/package/'
            ScriptSourceLocation      = 'https://www.powershellgallery.com/api/v2/items/psscript/'
            ScriptPublishLocation     = 'https://www.powershellgallery.com/api/v2/package/'
            InstallationPolicy        = 'Trusted'
            PackageManagementProvider = 'NuGet'
            Trusted                   = $true
            Registered                = $true
            ProviderOptions           = @{}
        }
        $entry.PSTypeNames.Insert(0, 'Microsoft.PowerShell.Commands.PSRepository')
        ([ordered]@{ PSGallery = $entry }) | Export-Clixml -Path $xmlPath -Force
        if ($repo) { Set-PSRepository -Name PSGallery -InstallationPolicy Trusted }
        Write-Output "fixed"
    }
  register: psgallery_result
  changed_when: "'fixed' in psgallery_result.stdout"

- name: "SAGA | Ensure NuGet provider installed (skip if already present, air-gapped safe)"
  win_shell: |
    $provider = Get-PackageProvider -Name NuGet -ListAvailable -ErrorAction SilentlyContinue |
                Where-Object { $_.Version -ge [Version]'2.8.5.201' } |
                Select-Object -First 1
    if ($provider) {
        Write-Output "already-installed:$($provider.Version)"
    } else {
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
        Write-Output "installed"
    }
  register: nuget_result
  changed_when: "'installed' in nuget_result.stdout"

- name: Upgrade module PowerShellGet to fix accept license issue on last windows ansible version
  win_shell: |
    [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
    Install-Module PowerShellGet -Force

- name: Windows | Check for ComputerManagementDsc Powershell module
  win_psmodule:
    name: ComputerManagementDsc
    state: present

- name: Windows | Enable Remote Desktop
  win_dsc:
    resource_name: RemoteDesktopAdmin
    IsSingleInstance : 'yes'
    Ensure: present
    UserAuthentication: Secure

- name: Windows | Check for xNetworking Powershell module
  win_psmodule:
    name: xNetworking
    state: present

- name: Firewall | Allow RDP through Firewall
  win_dsc:
    resource_name: xFirewall
    Name: "Administrator access for RDP (TCP-In)"
    Ensure: present
    Enabled: True
    Profile: "Domain"
    Direction: "Inbound"
    Localport: "3389"
    Protocol: "TCP"
    Description: "Opens the listener port for RDP"

- name: Add a network static route
  community.windows.win_route:
    destination: "{{route_network}}"
    gateway: "{{route_gateway}}"
    metric: 1
    state: present
  when: add_route == "yes"
